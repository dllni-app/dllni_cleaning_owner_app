name: dllni_cleaninig_owner_app
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  common_package:
    path: common_package

  easy_localization: ^3.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.1
  injectable: ^2.7.1+4
  get_it: ^8.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  awesome_notifications: ^0.11.0
  dotted_border: ^3.1.0
  shimmer: ^3.0.0
  tab_indicator_styler: ^2.0.0
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  fl_chart: ^1.1.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.11.1
  injectable_generator: ^2.12.0

dependency_overrides:
  analyzer: ^10.0.1

flutter:

  uses-material-design: true

  #         weight: 700
  assets:
    - assets/translations/
    - assets/images/

  fonts:
    - family: cairo
      fonts:
        - asset: assets/fonts/cairo.ttf