name: Cleaning Financial Ledger V2

on:
  pull_request:
    paths:
      - 'lib/features/profile/data/models/fetch_deposit_account_usecase_model.dart'
      - 'lib/features/profile/data/models/fetch_deposit_transactions_usecase_model.dart'
      - 'lib/features/profile/view/screens/wallet_screen.dart'
      - 'test/features/profile/data/models/fetch_deposit_account_usecase_model_test.dart'
      - '.github/workflows/cleaning-financial-ledger-v2.yml'

permissions:
  contents: write

jobs:
  wallet:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format financial wallet sources
        run: |
          dart format \
            lib/features/profile/data/models/fetch_deposit_account_usecase_model.dart \
            lib/features/profile/data/models/fetch_deposit_transactions_usecase_model.dart \
            lib/features/profile/view/screens/wallet_screen.dart \
            test/features/profile/data/models/fetch_deposit_account_usecase_model_test.dart

      - name: Commit formatting when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            lib/features/profile/data/models/fetch_deposit_account_usecase_model.dart \
            lib/features/profile/data/models/fetch_deposit_transactions_usecase_model.dart \
            lib/features/profile/view/screens/wallet_screen.dart \
            test/features/profile/data/models/fetch_deposit_account_usecase_model_test.dart
          git commit -m "chore: format financial wallet sources"
          git push

      - name: Analyze financial wallet sources
        run: |
          flutter analyze \
            lib/features/profile/data/models/fetch_deposit_account_usecase_model.dart \
            lib/features/profile/data/models/fetch_deposit_transactions_usecase_model.dart \
            lib/features/profile/view/screens/wallet_screen.dart

      - name: Run financial model tests
        run: flutter test test/features/profile/data/models/fetch_deposit_account_usecase_model_test.dart
