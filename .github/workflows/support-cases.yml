name: Support Cases

on:
  pull_request:
    paths:
      - 'lib/features/orders/**'
      - 'common_package/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/support-cases.yml'

jobs:
  support-cases:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/features/orders/data/source/orders_remote_data_source.dart lib/features/orders/domain/usecases/create_cleaning_booking_sos_use_case.dart

      - name: Analyze support case changes
        run: flutter analyze lib/features/orders/data/source/orders_remote_data_source.dart lib/features/orders/domain/usecases/create_cleaning_booking_sos_use_case.dart
